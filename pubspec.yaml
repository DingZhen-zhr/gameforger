name: gameforge_app
description: "GameForger - AI-powered game creation assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # 路由
  go_router: ^14.0.0

  # 后端
  supabase_flutter: ^2.8.0

  # WebView（游戏预览核心）
  flutter_inappwebview: ^6.1.0

  # 音频
  audioplayers: ^6.1.0
  just_audio: ^0.9.40

  # 存储 & 本地数据库
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0
  sqflite: ^2.4.0
  path_provider: ^2.1.0

  # UI
  cached_network_image: ^3.4.0
  flutter_code_editor: ^0.3.0
  responsive_framework: ^1.5.0
  google_fonts: ^6.2.0

  # 支付
  in_app_purchase: ^3.2.0

  # 工具
  dio: ^5.7.0
  image_picker: ^1.1.0
  file_picker: ^8.1.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.1.0
  uuid: ^4.5.0
  flutter_image_compress: ^2.3.0

  # Cupertino Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/templates/
    - assets/images/
