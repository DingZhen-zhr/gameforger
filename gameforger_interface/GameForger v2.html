<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GameForger · v2 — 双方向探索</title>
<link rel="stylesheet" href="forge-v2-tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, "SF Pro Text", system-ui, sans-serif;
    background: #E7E2D6;
    transition: background 200ms ease;
  }
  body[data-canvas-theme="dark"] { background: #0B0A09; }

  /* DesignCanvas hard-codes a dark backdrop inline — override at the root */
  body .design-canvas {
    background: #E7E2D6 !important;
    transition: background 220ms ease !important;
  }
  body[data-canvas-theme="dark"] .design-canvas {
    background: #0B0A09 !important;
  }

  /* Section header text — design-canvas inlines a light color suited for its dark default */
  body .dc-sectionhead > div { color: #2A2520 !important; }
  body .dc-sectionhead > div + div { color: rgba(42,37,32,0.65) !important; }
  body[data-canvas-theme="dark"] .dc-sectionhead > div { color: #F4ECD8 !important; }
  body[data-canvas-theme="dark"] .dc-sectionhead > div + div { color: rgba(244,236,216,0.55) !important; }

  /* Artboard label row (top of each phone) */
  body .dc-labeltext { color: #5F584C !important; }
  body[data-canvas-theme="dark"] .dc-labeltext { color: #A8A095 !important; }
  body .dc-grip { color: #918A7C !important; }
  body[data-canvas-theme="dark"] .dc-grip { color: #6F6852 !important; }

  /* Section header tint follows global theme */
  body .dc-section-header { color: rgba(22,20,14,0.7); }
  body[data-canvas-theme="dark"] .dc-section-header { color: rgba(244,236,216,0.7); }

  /* Floating theme switcher */
  .gf-switcher {
    position: fixed; top: 14px; right: 14px; z-index: 9999;
    display: flex; gap: 6px;
    padding: 6px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  }
  body[data-canvas-theme="dark"] .gf-switcher {
    background: rgba(20,18,14,0.85);
    border-color: rgba(255,255,255,0.10);
  }
  .gf-switcher button {
    width: 36px; height: 36px; border-radius: 999px; border: none; cursor: pointer;
    background: transparent; color: #16140E;
    display: flex; align-items: center; justify-content: center;
    transition: background 180ms, color 180ms;
  }
  body[data-canvas-theme="dark"] .gf-switcher button { color: #F4ECD8; }
  .gf-switcher button.on {
    background: #16A34A; color: #fff;
  }
  body[data-canvas-theme="dark"] .gf-switcher button.on {
    background: #4ADE80; color: #062711;
  }
  .gf-switcher .gf-label {
    padding: 0 12px; display: flex; align-items: center;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.4px;
    color: #5F584C;
  }
  body[data-canvas-theme="dark"] .gf-switcher .gf-label { color: #A8A095; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Theme switcher — fixed -->
<div id="switcher"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="forge-v2-base.jsx"></script>
<script type="text/babel" src="forge-v2-dir-a.jsx"></script>
<script type="text/babel" src="forge-v2-dir-b.jsx"></script>
<script type="text/babel" src="forge-v2-workspace.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Theme switcher ────────────────────────────────────────────
function Switcher({ theme, setTheme }) {
  return (
    <div className="gf-switcher">
      <span className="gf-label">主题</span>
      <button className={theme === 'light' ? 'on' : ''} onClick={() => setTheme('light')} title="浅色">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.4 1.4M17.6 17.6L19 19M5 19l1.4-1.4M17.6 6.4L19 5"/>
        </svg>
      </button>
      <button className={theme === 'dark' ? 'on' : ''} onClick={() => setTheme('dark')} title="深色">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/>
        </svg>
      </button>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem('gf-v2-theme') || 'light');
  useEffect(() => {
    localStorage.setItem('gf-v2-theme', theme);
    document.body.setAttribute('data-canvas-theme', theme);
  }, [theme]);

  // mount the switcher outside React root
  useEffect(() => {
    const el = document.getElementById('switcher');
    if (!el._root) el._root = ReactDOM.createRoot(el);
    el._root.render(<Switcher theme={theme} setTheme={setTheme}/>);
  }, [theme]);

  // helper that wraps any screen in a phone with dir+theme context
  const Frame = ({ dir, children }) => (
    <div style={{ padding: 9 }}>
      <PhoneV2 dir={dir} theme={theme}>{children}</PhoneV2>
    </div>
  );

  return (
    <DesignCanvas
      title="GameForger · v2"
      subtitle={`两个方向 · 浅色 / 深色可切换 · 当前 ${theme === 'dark' ? '深色' : '浅色'}`}
    >
      {/* ════════ 方向 A · iOS 原生派 ════════ */}
      <DCSection
        id="dir-a"
        title="A · iOS 原生派"
        subtitle="像 iOS 26 系统软件 · 分组列表 · 柔和大圆角 · System Green"
      >
        <DCArtboard id="a-splash" label="01 · 启动" width={420} height={892}>
          <Frame dir="a"><SplashA theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="a-projects" label="02 · 项目" width={420} height={892}>
          <Frame dir="a"><ProjectsA theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="a-gallery" label="03 · 作品" width={420} height={892}>
          <Frame dir="a"><GalleryA theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="a-settings" label="04 · 我的" width={420} height={892}>
          <Frame dir="a"><SettingsA theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="a-workspace" label="05 · 工作台 · 风扇卡轮 + 上拉对话" width={420} height={892}>
          <Frame dir="a"><FanWorkspace theme={theme} variant="a"/></Frame>
        </DCArtboard>
        <DCArtboard id="a-preview" label="06 · 预览" width={420} height={892}>
          <Frame dir="a"><PreviewA theme={theme}/></Frame>
        </DCArtboard>
      </DCSection>

      {/* ════════ 方向 B · 编辑工坊派 ════════ */}
      <DCSection
        id="dir-b"
        title="B · 编辑工坊派"
        subtitle="杂志编辑 + 终端 · Instrument Serif 大标题 + JetBrains Mono 标签 · 森林绿"
      >
        <DCArtboard id="b-splash" label="01 · 启动" width={420} height={892}>
          <Frame dir="b"><SplashB theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="b-projects" label="02 · Projects" width={420} height={892}>
          <Frame dir="b"><ProjectsB theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="b-gallery" label="03 · Works" width={420} height={892}>
          <Frame dir="b"><GalleryB theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="b-settings" label="04 · Profile" width={420} height={892}>
          <Frame dir="b"><SettingsB theme={theme}/></Frame>
        </DCArtboard>
        <DCArtboard id="b-workspace" label="05 · Workspace · 风扇卡轮 + 上拉对话" width={420} height={892}>
          <Frame dir="b"><FanWorkspace theme={theme} variant="b"/></Frame>
        </DCArtboard>
        <DCArtboard id="b-preview" label="06 · Preview" width={420} height={892}>
          <Frame dir="b"><PreviewB theme={theme}/></Frame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
